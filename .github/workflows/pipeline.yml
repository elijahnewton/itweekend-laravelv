name: Production CI/CD
on:
  push:
    branches: [ main ]

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 1. Get the code first

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_LEGACY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY_LEGACY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_REGION: us-east-1
        run: |
          export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID:-$AWS_ACCESS_KEY_LEGACY}"
          export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY:-$AWS_SECRET_KEY_LEGACY}"
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Missing AWS credentials. Set AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY (or legacy AWS_ACCESS_KEY/AWS_SECRET_KEY) secrets."
            exit 1
          fi
          terraform init -input=false
          terraform fmt -check
          terraform validate
          terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}"

  deploy:
    needs: infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build & Push
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/lms:${{ github.sha }} .
          echo ${{ secrets.DOCKER_PASS }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin
          docker push ${{ secrets.DOCKER_USER }}/lms:${{ github.sha }}

      - name: Provision DB & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu  # Standard for most AWS Ubuntu AMIs
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Ensure we are in the right directory
            mkdir -p ~/app && cd ~/app
            
            # 1. Ensure DB exists
            export PGPASSWORD="${{ secrets.DB_PASSWORD }}"
            psql -h ${{ secrets.DB_HOST }} -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'lms'" | grep -q 1 || \
            psql -h ${{ secrets.DB_HOST }} -U postgres -d postgres -c "CREATE DATABASE lms;"
            
            # 2. Create .env (Database handles Cache and Queue)
            cat <<EOF > .env
            APP_KEY=${{ secrets.APP_KEY }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_CONNECTION=pgsql
            DB_PORT=5432
            DB_DATABASE=lms
            DB_USERNAME=postgres
            CACHE_STORE=database
            QUEUE_CONNECTION=database
            SESSION_DRIVER=database
            EOF

            # 3. Deploy using the specific image tag built in this run
            export DOCKER_IMAGE=${{ secrets.DOCKER_USER }}/lms:${{ github.sha }}
            docker compose pull && docker compose up -d
