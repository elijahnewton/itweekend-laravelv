services:
  app:
    image: ${DOCKER_IMAGE}:${BUILD_NUMBER}
    ports:
      - "80:8000"
    env_file: .env # Injected by Jenkins
    restart: always
    # We run migrations before starting the server
    command: >
      sh -c "php artisan migrate --force &&
             php artisan content:sync &&
             frankenphp php-server --listen :8000"

  worker:
    image: ${DOCKER_IMAGE}:${BUILD_NUMBER}
    env_file: .env
    restart: always
    # The worker processes jobs stored in your Postgres 'jobs' table
    command: php artisan queue:work --tries=3 --delay=3
