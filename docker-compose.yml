services:
  app:
    image: ${DOCKER_IMAGE}:${BUILD_NUMBER}
    ports:
      - "80:8000"
    env_file: .env # Jenkins will generate this file on the fly
    restart: always
    command: >
      sh -c "php artisan migrate --force &&
             php artisan content:sync &&
             frankenphp php-server --listen :8000"

  worker:
    image: ${DOCKER_IMAGE}:${BUILD_NUMBER}
    env_file: .env
    restart: always
    command: php artisan queue:work --tries=3
