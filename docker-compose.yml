services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "IT Weekend LMS"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_HOST: {{DB_HOST}}
      DB_PASSWORD: {{DB_PASSWORD}}
    volumes:
      - app_storage:/var/www/html/storage/app
    command: >
      sh -c "php artisan migrate --force &&
             php artisan content:sync &&
             frankenphp run --config /etc/caddy/Caddyfile"

  
    environment:
      APP_ENV: production
      DB_HOST: {{DB_HOST}}
      DB_PASSWORD: {{DB_PASSWORD}}
      QUEUE_CONNECTION: database
    command: php artisan queue:work --tries=3

volumes:
  app_storage:
