services:
  app:
    image: ${DOCKER_IMAGE}
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    command: >
      sh -c "php artisan migrate --force &&
             php artisan content:sync &&
             frankenphp php-server --listen :8000"

  worker:
    image: ${DOCKER_IMAGE}
    restart: always
    env_file: .env
    command: php artisan queue:work --tries=3