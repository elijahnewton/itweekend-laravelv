services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "IT Weekend LMS"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: lms
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
    volumes:
      - app_storage:/var/www/html/storage/app
    command: >
      sh -c "php artisan migrate --force &&
             php artisan content:sync &&
             frankenphp run --config /etc/caddy/Caddyfile"

  
    environment:
      APP_ENV: production
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: lms
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
    command: php artisan queue:work --tries=3

volumes:
  app_storage:
